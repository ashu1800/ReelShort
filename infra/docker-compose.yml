services:
  postgres:
    image: postgres:17
    container_name: reelshort-postgres
    environment:
      POSTGRES_DB: reelshort
      POSTGRES_USER: reelshort
      POSTGRES_PASSWORD: reelshort_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8
    container_name: reelshort-redis
    ports:
      - "6379:6379"

  content-provider:
    build:
      context: ../content-provider
    container_name: reelshort-content-provider
    ports:
      - "5000:5000"
    depends_on:
      - redis

  backend:
    build:
      context: ../backend
    container_name: reelshort-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - content-provider

  nginx:
    image: nginx:1.27
    container_name: reelshort-nginx
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres-data:

