services:
  postgres:
    image: postgres:17
    container_name: reelshort-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-reelshort}
      POSTGRES_USER: ${POSTGRES_USER:-reelshort}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reelshort} -d ${POSTGRES_DB:-reelshort}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    container_name: reelshort-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  content-provider:
    build:
      context: ../content-provider
    container_name: reelshort-content-provider
    environment:
      CONTENT_PROVIDER_HOST: 0.0.0.0
      CONTENT_PROVIDER_PORT: 5000
      REELSHORT_SITE_URL: ${REELSHORT_SITE_URL:-https://www.reelshort.com}
      REELSHORT_SITE_ID: ${REELSHORT_SITE_ID:-37}
      REELSHORT_REQUEST_TIMEOUT_SECONDS: ${REELSHORT_REQUEST_TIMEOUT_SECONDS:-10}
      REELSHORT_MAX_RESPONSE_BYTES: ${REELSHORT_MAX_RESPONSE_BYTES:-5242880}
      REELSHORT_MAX_REDIRECTS: ${REELSHORT_MAX_REDIRECTS:-3}
      REELSHORT_NEXT_BUILD_ID: ${REELSHORT_NEXT_BUILD_ID:-}
      REELSHORT_CATALOG_SEARCH_KEYWORDS: ${REELSHORT_CATALOG_SEARCH_KEYWORDS:-}
      REELSHORT_CATALOG_SEARCH_KEYWORDS_EN: ${REELSHORT_CATALOG_SEARCH_KEYWORDS_EN:-}
      REELSHORT_CATALOG_SEARCH_KEYWORDS_ZH_TW: ${REELSHORT_CATALOG_SEARCH_KEYWORDS_ZH_TW:-}
      REELSHORT_CATALOG_MAX_PAGES_PER_KEYWORD: ${REELSHORT_CATALOG_MAX_PAGES_PER_KEYWORD:-3}
      REELSHORT_CATALOG_MAX_BOOKS: ${REELSHORT_CATALOG_MAX_BOOKS:-500}
      REELSHORT_CATALOG_REQUEST_WORKERS: ${REELSHORT_CATALOG_REQUEST_WORKERS:-8}
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
    container_name: reelshort-backend
    environment:
      REELSHORT_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-reelshort}
      REELSHORT_DB_USERNAME: ${POSTGRES_USER:-reelshort}
      REELSHORT_DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      REELSHORT_JPA_DDL_AUTO: ${REELSHORT_JPA_DDL_AUTO:-validate}
      REELSHORT_FLYWAY_ENABLED: ${REELSHORT_FLYWAY_ENABLED:-true}
      REELSHORT_ADMIN_USERNAME: ${REELSHORT_ADMIN_USERNAME:-admin}
      REELSHORT_ADMIN_PASSWORD_HASH: ${REELSHORT_ADMIN_PASSWORD_HASH:-}
      REELSHORT_CONTENT_PROVIDER_BASE_URL: http://content-provider:5000
      REELSHORT_CONTENT_REFRESH_ENABLED: ${REELSHORT_CONTENT_REFRESH_ENABLED:-true}
      REELSHORT_CONTENT_REFRESH_INITIAL_DELAY: ${REELSHORT_CONTENT_REFRESH_INITIAL_DELAY:-5m}
      REELSHORT_CONTENT_REFRESH_INTERVAL: ${REELSHORT_CONTENT_REFRESH_INTERVAL:-6h}
      REELSHORT_CONTENT_REFRESH_SHELVES: ${REELSHORT_CONTENT_REFRESH_SHELVES:-recommend}
      REELSHORT_CONTENT_REFRESH_LOCALES: ${REELSHORT_CONTENT_REFRESH_LOCALES:-en,zh-TW}
      REELSHORT_CONTENT_VIDEO_FALLBACK_TTL: ${REELSHORT_CONTENT_VIDEO_FALLBACK_TTL:-10m}
      REELSHORT_INTERNAL_SUPER_TOKEN: ${REELSHORT_INTERNAL_SUPER_TOKEN:-}
      REELSHORT_SMS_CALLBACK_ENABLED: ${REELSHORT_SMS_CALLBACK_ENABLED:-true}
      REELSHORT_SMS_CALLBACK_URL: ${REELSHORT_SMS_CALLBACK_URL:-}
      REELSHORT_SMS_CALLBACK_API_KEY: ${REELSHORT_SMS_CALLBACK_API_KEY:-}
      REELSHORT_SMS_CALLBACK_API_SECRET: ${REELSHORT_SMS_CALLBACK_API_SECRET:-}
      REELSHORT_SMS_CALLBACK_TIMEOUT: ${REELSHORT_SMS_CALLBACK_TIMEOUT:-5s}
      REELSHORT_PAYMENT_CALLBACK_SECRET: ${REELSHORT_PAYMENT_CALLBACK_SECRET:?REELSHORT_PAYMENT_CALLBACK_SECRET must be set}
      REELSHORT_RATE_LIMIT_STORE: ${REELSHORT_RATE_LIMIT_STORE:-redis}
      REELSHORT_REDIS_HOST: redis
      REELSHORT_REDIS_PORT: 6379
      REELSHORT_COS_SECRET_ID: ${REELSHORT_COS_SECRET_ID:-}
      REELSHORT_COS_SECRET_KEY: ${REELSHORT_COS_SECRET_KEY:-}
      REELSHORT_COS_REGION: ${REELSHORT_COS_REGION:-ap-chengdu}
      REELSHORT_COS_BUCKET: ${REELSHORT_COS_BUCKET:-}
      REELSHORT_RELEASE_PRESIGN_TTL: ${REELSHORT_RELEASE_PRESIGN_TTL:-1h}
      REELSHORT_TRON_HOT_WALLET_ADDRESS: ${REELSHORT_TRON_HOT_WALLET_ADDRESS:-}
      REELSHORT_TRON_INCOMING_TRANSFER_MAX_PAGES: ${REELSHORT_TRON_INCOMING_TRANSFER_MAX_PAGES:-50}
      REELSHORT_VIP_CONFIRMATION_GRACE: ${REELSHORT_VIP_CONFIRMATION_GRACE:-10m}
      REELSHORT_ETH_HOT_WALLET_ADDRESS: ${REELSHORT_ETH_HOT_WALLET_ADDRESS:-}
      REELSHORT_BSC_HOT_WALLET_ADDRESS: ${REELSHORT_BSC_HOT_WALLET_ADDRESS:-}
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      content-provider:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx:
    build:
      context: ../admin-web
    container_name: reelshort-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
