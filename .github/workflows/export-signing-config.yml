name: Export Signing Config (temporary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Write signing config to file
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf 'ANDROID_SIGNING_STORE_PASSWORD=%s\n' "$STORE_PASSWORD" > signing-config.txt
          printf 'ANDROID_SIGNING_KEY_ALIAS=%s\n' "$KEY_ALIAS" >> signing-config.txt
          printf 'ANDROID_SIGNING_KEY_PASSWORD=%s\n' "$KEY_PASSWORD" >> signing-config.txt
          chmod 600 signing-config.txt
      - name: Upload config as artifact
        uses: actions/upload-artifact@v4
        with:
          name: signing-config
          path: signing-config.txt
          retention-days: 1
