name: Export Signing Keystore (temporary)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Restore keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > shortlink-release.jks
          chmod 600 shortlink-release.jks
          echo "Keystore restored, size: $(stat -c%s shortlink-release.jks) bytes"
      - name: Verify keystore is readable
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
        run: |
          keytool -list -v -keystore shortlink-release.jks \
            -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" -keypass "$KEY_PASSWORD" \
            | grep -E "Alias name|Owner|Valid from|Signature algorithm" || true
      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shortlink-release-keystore
          path: shortlink-release.jks
          retention-days: 1
