name: Android Self-Hosted Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: android-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x android-app/gradlew

      - name: Validate release tag and version
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$(git describe --tags --exact-match HEAD)" == "$RELEASE_TAG" ]]
          app_version="$(cd android-app && ./gradlew :app:printAppVersion --no-daemon -q | tail -n 1)"
          expected="${RELEASE_TAG#v}"
          [[ "${app_version%%/*}" == "$expected" ]]
          echo "Building $RELEASE_TAG with app version $app_version"

      - name: Restore release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64"
          key_path="$RUNNER_TEMP/shortlink-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "ANDROID_SIGNING_STORE_FILE=$key_path" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: android-app
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK metadata and signature
        shell: bash
        run: |
          set -euo pipefail
          apk="android-app/app/build/outputs/apk/release/app-release.apk"
          test -f "$apk"
          build_tools="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk"
          badging="$RUNNER_TEMP/shortlink-badging.txt"
          "$build_tools/aapt" dump badging "$apk" > "$badging"
          grep -F "package: name='com.reelshort.app'" "$badging"
          grep -F "versionName='${RELEASE_TAG#v}'" "$badging"

      - name: Prepare self-hosted release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          apk="ShortLink-${RELEASE_TAG}.apk"
          version="${RELEASE_TAG#v}"
          app_version="$(cd android-app && ./gradlew :app:printAppVersion --no-daemon -q | tail -n 1)"
          version_code="${app_version##*/}"
          cp android-app/app/build/outputs/apk/release/app-release.apk "dist/$apk"
          (cd dist && sha256sum "$apk" > "$apk.sha256")
          apk_size="$(stat -c%s "dist/$apk")"
          checksum_size="$(stat -c%s "dist/$apk.sha256")"
          published_at="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          jq -n \
            --arg versionName "$version" \
            --argjson versionCode "$version_code" \
            --arg title "ShortLink $RELEASE_TAG" \
            --arg releaseNotes "ShortLink $RELEASE_TAG update." \
            --arg publishedAt "$published_at" \
            --arg apkUrl "https://shortlink.hjj888.cc/downloads/android/$apk" \
            --arg sha256Url "https://shortlink.hjj888.cc/downloads/android/$apk.sha256" \
            --argjson sizeBytes "$apk_size" \
            --argjson sha256SizeBytes "$checksum_size" \
            '{
              versionName: $versionName,
              versionCode: $versionCode,
              minimumVersionCode: 1,
              mandatory: false,
              title: $title,
              releaseNotes: $releaseNotes,
              publishedAt: $publishedAt,
              apkUrl: $apkUrl,
              sha256Url: $sha256Url,
              sizeBytes: $sizeBytes,
              sha256SizeBytes: $sha256SizeBytes
            }' > dist/latest.json
          chmod 644 "dist/$apk" "dist/$apk.sha256" dist/latest.json

      - name: Configure release SSH identity
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SHORTLINK_RELEASE_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SHORTLINK_RELEASE_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SSH_KNOWN_HOSTS"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$SSH_PRIVATE_KEY" > "$HOME/.ssh/shortlink-release"
          printf '%s\n' "$SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/shortlink-release" "$HOME/.ssh/known_hosts"

      - name: Upload and publish release atomically
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SHORTLINK_RELEASE_SSH_HOST }}
          SSH_PORT: ${{ secrets.SHORTLINK_RELEASE_SSH_PORT }}
          SSH_USER: ${{ secrets.SHORTLINK_RELEASE_SSH_USER }}
        run: |
          set -euo pipefail
          test -n "$SSH_HOST"
          test -n "$SSH_PORT"
          test -n "$SSH_USER"
          apk="ShortLink-${RELEASE_TAG}.apk"
          remote_dir="/opt/reelshort/releases/android"
          ssh_options=(-i "$HOME/.ssh/shortlink-release" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes)
          retry() {
            local attempt=1
            until "$@"; do
              if (( attempt >= 5 )); then
                return 1
              fi
              sleep $((attempt * 5))
              attempt=$((attempt + 1))
            done
          }
          retry scp -i "$HOME/.ssh/shortlink-release" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "dist/$apk" "$SSH_USER@$SSH_HOST:$remote_dir/$apk.part"
          retry scp -i "$HOME/.ssh/shortlink-release" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "dist/$apk.sha256" "$SSH_USER@$SSH_HOST:$remote_dir/$apk.sha256.part"
          retry scp -i "$HOME/.ssh/shortlink-release" -P "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            dist/latest.json "$SSH_USER@$SSH_HOST:$remote_dir/latest.json.part"
          retry ssh "${ssh_options[@]}" "$SSH_USER@$SSH_HOST" \
            "set -eu; cd '$remote_dir'; test -s '$apk.part'; test -s '$apk.sha256.part'; test -s latest.json.part; chmod 0644 '$apk.part' '$apk.sha256.part' latest.json.part; mv -f '$apk.part' '$apk'; mv -f '$apk.sha256.part' '$apk.sha256'; mv -f latest.json.part latest.json"

      - name: Remove release SSH identity
        if: always()
        shell: bash
        run: rm -f "$HOME/.ssh/shortlink-release"
