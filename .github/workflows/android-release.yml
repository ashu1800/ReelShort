name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_STORE_PASSWORD }}
      ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Prepare Gradle wrapper
        run: chmod +x android-app/gradlew

      - name: Validate release tag and version
        shell: bash
        run: |
          set -euo pipefail
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$(git describe --tags --exact-match HEAD)" == "$RELEASE_TAG" ]]
          app_version="$(cd android-app && ./gradlew :app:printAppVersion --no-daemon -q | tail -n 1)"
          expected="${RELEASE_TAG#v}"
          [[ "${app_version%%/*}" == "$expected" ]]
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite it" >&2
            exit 1
          fi
          echo "Building $RELEASE_TAG with app version $app_version"

      - name: Restore release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_SIGNING_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64"
          key_path="$RUNNER_TEMP/shortlink-release.jks"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$key_path"
          chmod 600 "$key_path"
          echo "ANDROID_SIGNING_STORE_FILE=$key_path" >> "$GITHUB_ENV"

      - name: Run Android unit tests and lint
        working-directory: android-app
        run: ./gradlew :app-core:test :app:testReleaseUnitTest :app:lintRelease --no-daemon

      - name: Run Compose instrumentation tests
        uses: ReactiveCircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_2
          script: cd android-app && ./gradlew :app:connectedDebugAndroidTest --no-daemon

      - name: Build signed release APK
        working-directory: android-app
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK metadata and signature
        shell: bash
        run: |
          set -euo pipefail
          apk="android-app/app/build/outputs/apk/release/app-release.apk"
          test -f "$apk"
          build_tools="$(find "$ANDROID_HOME/build-tools" -maxdepth 1 -mindepth 1 -type d | sort -V | tail -n 1)"
          "$build_tools/apksigner" verify --verbose --print-certs "$apk"
          badging="$RUNNER_TEMP/shortlink-badging.txt"
          "$build_tools/aapt" dump badging "$apk" > "$badging"
          grep -F "package: name='com.reelshort.app'" "$badging"
          grep -F "versionName='${RELEASE_TAG#v}'" "$badging"

      - name: Prepare Release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          apk="ShortLink-${RELEASE_TAG}.apk"
          cp android-app/app/build/outputs/apk/release/app-release.apk "dist/$apk"
          (cd dist && sha256sum "$apk" > "$apk.sha256")
          chmod 644 "dist/$apk" "dist/$apk.sha256"

      - name: Create stable GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "ShortLink ${RELEASE_TAG}" \
            --generate-notes \
            dist/"ShortLink-${RELEASE_TAG}.apk" \
            dist/"ShortLink-${RELEASE_TAG}.apk.sha256"
