map $http_cf_connecting_ip $apk_download_client_ip {
    default $http_cf_connecting_ip;
    "" $binary_remote_addr;
}

limit_conn_zone $apk_download_client_ip zone=apk_download_per_ip:10m;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /api/app/update/latest {
        alias /srv/releases/android/latest.json;
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header X-Content-Type-Options "nosniff" always;
        limit_except GET { deny all; }
    }

    location ~ ^/downloads/android/(?<release_file>ShortLink-v[0-9]+\.[0-9]+\.[0-9]+\.apk(?:\.sha256)?)$ {
        alias /srv/releases/android/$release_file;
        default_type application/octet-stream;
        types {
            application/vnd.android.package-archive apk;
            text/plain sha256;
        }
        autoindex off;
        limit_except GET { deny all; }
        limit_conn apk_download_per_ip 1;
        limit_conn_status 429;
        limit_rate_after 2m;
        limit_rate 1m;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /downloads/android/ {
        return 404;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/health {
        proxy_pass http://backend:8080/actuator/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
