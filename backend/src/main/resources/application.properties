spring.application.name=reelshort-backend
reelshort.admin.password-hash=${REELSHORT_ADMIN_PASSWORD_HASH:}
reelshort.payment.callback-secret=${REELSHORT_PAYMENT_CALLBACK_SECRET:}
server.port=8080
management.endpoints.web.exposure.include=health,info
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
reelshort.content-provider.base-url=http://127.0.0.1:5000
reelshort.content.refresh.enabled=${REELSHORT_CONTENT_REFRESH_ENABLED:true}
reelshort.content.refresh.initial-delay=${REELSHORT_CONTENT_REFRESH_INITIAL_DELAY:5m}
reelshort.content.refresh.interval=${REELSHORT_CONTENT_REFRESH_INTERVAL:6h}
reelshort.content.refresh.shelves=${REELSHORT_CONTENT_REFRESH_SHELVES:recommend}
reelshort.content.refresh.locales=${REELSHORT_CONTENT_REFRESH_LOCALES:en}
reelshort.content.cache.video-fallback-ttl=${REELSHORT_CONTENT_VIDEO_FALLBACK_TTL:10m}
spring.http.client.connect-timeout=2s
spring.http.client.read-timeout=5s
spring.datasource.url=${REELSHORT_DB_URL:jdbc:postgresql://127.0.0.1:5432/reelshort}
spring.datasource.username=${REELSHORT_DB_USERNAME:reelshort}
spring.datasource.password=${REELSHORT_DB_PASSWORD:reelshort_dev}
spring.jpa.hibernate.ddl-auto=${REELSHORT_JPA_DDL_AUTO:validate}
spring.flyway.enabled=${REELSHORT_FLYWAY_ENABLED:true}
spring.flyway.locations=classpath:db/migration
logging.file.name=${REELSHORT_LOG_FILE:logs/backend.log}
reelshort.system.logs.root=${REELSHORT_SYSTEM_LOG_ROOT:logs}
reelshort.system.logs.max-lines=${REELSHORT_SYSTEM_LOG_MAX_LINES:500}
reelshort.system.logs.max-bytes=${REELSHORT_SYSTEM_LOG_MAX_BYTES:1048576}

reelshort.auth.session.access-token-ttl=${REELSHORT_AUTH_SESSION_ACCESS_TOKEN_TTL:7d}
reelshort.auth.session.cleanup-retention=${REELSHORT_AUTH_SESSION_CLEANUP_RETENTION:1d}
reelshort.auth.session.cleanup-initial-delay=${REELSHORT_AUTH_SESSION_CLEANUP_INITIAL_DELAY:1h}
reelshort.auth.session.cleanup-interval=${REELSHORT_AUTH_SESSION_CLEANUP_INTERVAL:1h}
reelshort.internal.super-token=${REELSHORT_INTERNAL_SUPER_TOKEN:}

reelshort.admin.session.cleanup-retention=${REELSHORT_ADMIN_SESSION_CLEANUP_RETENTION:1d}
reelshort.admin.session.cleanup-initial-delay=${REELSHORT_ADMIN_SESSION_CLEANUP_INITIAL_DELAY:1h}
reelshort.admin.session.cleanup-interval=${REELSHORT_ADMIN_SESSION_CLEANUP_INTERVAL:1h}

reelshort.rate-limit.enabled=${REELSHORT_RATE_LIMIT_ENABLED:true}
reelshort.rate-limit.store=${REELSHORT_RATE_LIMIT_STORE:memory}
# H3: 可信代理 IP 白名单（逗号分隔），仅这些 IP 的 X-Forwarded-For 会被采纳。
# 默认为空（仅信任 loopback/同机 Nginx）。生产部署在 Docker 网络时配置 Nginx 容器 IP。
reelshort.rate-limit.trusted-proxies=${REELSHORT_TRUSTED_PROXIES:}
spring.data.redis.host=${REELSHORT_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REELSHORT_REDIS_PORT:6379}
spring.data.redis.repositories.enabled=false
reelshort.rate-limit.rules[0].name=app-auth
reelshort.rate-limit.rules[0].method=POST
reelshort.rate-limit.rules[0].path=/api/app/auth/**
reelshort.rate-limit.rules[0].limit=${REELSHORT_RATE_LIMIT_APP_AUTH_LIMIT:20}
reelshort.rate-limit.rules[0].window=${REELSHORT_RATE_LIMIT_APP_AUTH_WINDOW:1m}
reelshort.rate-limit.rules[1].name=admin-auth
reelshort.rate-limit.rules[1].method=POST
reelshort.rate-limit.rules[1].path=/api/admin/auth/login
reelshort.rate-limit.rules[1].limit=${REELSHORT_RATE_LIMIT_ADMIN_AUTH_LIMIT:10}
reelshort.rate-limit.rules[1].window=${REELSHORT_RATE_LIMIT_ADMIN_AUTH_WINDOW:1m}
reelshort.rate-limit.rules[2].name=app-content-read
reelshort.rate-limit.rules[2].method=GET
reelshort.rate-limit.rules[2].path=/api/app/content/**
reelshort.rate-limit.rules[2].limit=${REELSHORT_RATE_LIMIT_APP_CONTENT_LIMIT:120}
reelshort.rate-limit.rules[2].window=${REELSHORT_RATE_LIMIT_APP_CONTENT_WINDOW:1m}
reelshort.rate-limit.rules[3].name=app-home-read
reelshort.rate-limit.rules[3].method=GET
reelshort.rate-limit.rules[3].path=/api/app/home/**
reelshort.rate-limit.rules[3].limit=${REELSHORT_RATE_LIMIT_APP_HOME_LIMIT:120}
reelshort.rate-limit.rules[3].window=${REELSHORT_RATE_LIMIT_APP_HOME_WINDOW:1m}
reelshort.rate-limit.rules[4].name=app-watch-progress
reelshort.rate-limit.rules[4].method=POST
reelshort.rate-limit.rules[4].path=/api/app/watch/progress
reelshort.rate-limit.rules[4].limit=${REELSHORT_RATE_LIMIT_APP_WATCH_LIMIT:240}
reelshort.rate-limit.rules[4].window=${REELSHORT_RATE_LIMIT_APP_WATCH_WINDOW:1m}
reelshort.rate-limit.rules[5].name=app-points-read
reelshort.rate-limit.rules[5].method=GET
reelshort.rate-limit.rules[5].path=/api/app/points/**
reelshort.rate-limit.rules[5].limit=${REELSHORT_RATE_LIMIT_APP_POINTS_LIMIT:120}
reelshort.rate-limit.rules[5].window=${REELSHORT_RATE_LIMIT_APP_POINTS_WINDOW:1m}
reelshort.rate-limit.rules[6].name=app-release-read
reelshort.rate-limit.rules[6].method=GET
reelshort.rate-limit.rules[6].path=/api/app/release/**
reelshort.rate-limit.rules[6].limit=${REELSHORT_RATE_LIMIT_APP_RELEASE_LIMIT:60}
reelshort.rate-limit.rules[6].window=${REELSHORT_RATE_LIMIT_APP_RELEASE_WINDOW:1m}
reelshort.rate-limit.rules[7].name=app-vip-order-create
reelshort.rate-limit.rules[7].method=POST
reelshort.rate-limit.rules[7].path=/api/app/vip/orders
reelshort.rate-limit.rules[7].limit=${REELSHORT_RATE_LIMIT_APP_VIP_ORDER_LIMIT:5}
reelshort.rate-limit.rules[7].window=${REELSHORT_RATE_LIMIT_APP_VIP_ORDER_WINDOW:1m}
reelshort.rate-limit.rules[8].name=admin-2fa-sensitive
reelshort.rate-limit.rules[8].method=POST
reelshort.rate-limit.rules[8].path=/api/admin/2fa/**
reelshort.rate-limit.rules[8].limit=${REELSHORT_RATE_LIMIT_ADMIN_2FA_LIMIT:5}
reelshort.rate-limit.rules[8].window=${REELSHORT_RATE_LIMIT_ADMIN_2FA_WINDOW:1m}
reelshort.rate-limit.rules[9].name=admin-vip-mutation
reelshort.rate-limit.rules[9].method=POST
reelshort.rate-limit.rules[9].path=/api/admin/vip/orders/**
reelshort.rate-limit.rules[9].limit=${REELSHORT_RATE_LIMIT_ADMIN_VIP_LIMIT:20}
reelshort.rate-limit.rules[9].window=${REELSHORT_RATE_LIMIT_ADMIN_VIP_WINDOW:1m}
reelshort.vip.confirmation-grace=${REELSHORT_VIP_CONFIRMATION_GRACE:10m}

reelshort.release.cos-secret-id=${REELSHORT_COS_SECRET_ID:}
reelshort.release.cos-secret-key=${REELSHORT_COS_SECRET_KEY:}
reelshort.release.cos-region=${REELSHORT_COS_REGION:ap-chengdu}
reelshort.release.cos-bucket=${REELSHORT_COS_BUCKET:}
reelshort.release.presign-ttl=${REELSHORT_RELEASE_PRESIGN_TTL:1h}

reelshort.tron.node-url=${REELSHORT_TRON_NODE_URL:https://api.trongrid.io}
reelshort.tron.api-key=${REELSHORT_TRON_API_KEY:}
reelshort.tron.usdt-contract=${REELSHORT_TRON_USDT_CONTRACT:TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t}
reelshort.tron.incoming-transfer-max-pages=${REELSHORT_TRON_INCOMING_TRANSFER_MAX_PAGES:50}
reelshort.tron.required-confirmations=${REELSHORT_TRON_REQUIRED_CONFIRMATIONS:20}
reelshort.tron.hot-wallet-address=${REELSHORT_TRON_HOT_WALLET_ADDRESS:}
reelshort.tron.max-response-bytes=${REELSHORT_TRON_MAX_RESPONSE_BYTES:5242880}
reelshort.tron.request-interval=${REELSHORT_TRON_REQUEST_INTERVAL:250ms}
reelshort.tron.rate-limit-retries=${REELSHORT_TRON_RATE_LIMIT_RETRIES:3}
reelshort.tron.retry-initial-delay=${REELSHORT_TRON_RETRY_INITIAL_DELAY:1s}
reelshort.tron.chain-parameter-cache-ttl=${REELSHORT_TRON_CHAIN_PARAMETER_CACHE_TTL:5m}
reelshort.eth.required-confirmations=${REELSHORT_ETH_REQUIRED_CONFIRMATIONS:12}

# 以太坊 ERC-20 USDT 提现打款配置（Infura RPC 节点）
reelshort.eth.node-url=${REELSHORT_ETH_NODE_URL:https://mainnet.infura.io/v3/}
reelshort.eth.api-key=${REELSHORT_ETH_API_KEY:}
reelshort.eth.usdt-contract=${REELSHORT_ETH_USDT_CONTRACT:0xdAC17F958D2ee523a2206206994597C13D831ec7}
reelshort.eth.chain-id=${REELSHORT_ETH_CHAIN_ID:1}
reelshort.eth.hot-wallet-address=${REELSHORT_ETH_HOT_WALLET_ADDRESS:}

# 币安链 BEP-20 USDT 提现打款配置（BSC 主网，USDT 为 18 decimals）
reelshort.bsc.node-url=${REELSHORT_BSC_NODE_URL:https://bsc-dataseed.binance.org/}
reelshort.bsc.api-key=${REELSHORT_BSC_API_KEY:}
reelshort.bsc.usdt-contract=${REELSHORT_BSC_USDT_CONTRACT:0x55d398326f99059fF775485246999027B3197955}
reelshort.bsc.chain-id=${REELSHORT_BSC_CHAIN_ID:56}
reelshort.bsc.required-confirmations=${REELSHORT_BSC_REQUIRED_CONFIRMATIONS:15}
reelshort.bsc.usdt-decimals=${REELSHORT_BSC_USDT_DECIMALS:18}
reelshort.bsc.hot-wallet-address=${REELSHORT_BSC_HOT_WALLET_ADDRESS:}
