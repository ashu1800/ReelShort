spring.application.name=reelshort-backend
server.port=8080
management.endpoints.web.exposure.include=health,info
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
reelshort.content-provider.base-url=http://127.0.0.1:5000
spring.http.client.connect-timeout=2s
spring.http.client.read-timeout=5s
spring.datasource.url=${REELSHORT_DB_URL:jdbc:postgresql://127.0.0.1:5432/reelshort}
spring.datasource.username=${REELSHORT_DB_USERNAME:reelshort}
spring.datasource.password=${REELSHORT_DB_PASSWORD:reelshort_dev}
spring.jpa.hibernate.ddl-auto=${REELSHORT_JPA_DDL_AUTO:update}
